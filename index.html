<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intellectus Agens</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #111111;
      overflow: hidden;
      font-family: 'Juana', 'Heiti TC', 'STHeiti', 'Microsoft JhengHei', 'PMingLiU', serif;
    }

    /*
    @font-face {
      font-family: 'Juana';
      src: url('juana.woff2') format('woff2');
      font-weight: 100 900;
    }
    */

    canvas#tree {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* ── Vignette overlay — hides network edges near screen border ── */
    .vignette {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: radial-gradient(
        ellipse 80% 80% at 50% 50%,
        transparent 40%,
        rgba(17,17,17,0.55) 70%,
        rgba(17,17,17,0.92) 88%,
        #111111 100%
      );
    }

    /* ── Card ── */
    .card {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      width: 400px;
      padding: 32px 28px 28px;
      border-radius: 18px;
      background: #141414;
      border: 1px solid #1E3A5F;
      box-shadow: 0 24px 60px rgba(0,0,0,0.55);
      animation: fadeUp 0.9s cubic-bezier(.16,1,.3,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translate(-50%, calc(-50% + 20px)); }
      to   { opacity: 1; transform: translate(-50%, -50%); }
    }

    /* ── Logo ── */
    .logo-zone {
      display: flex;
      justify-content: center;
      margin-bottom: 22px;
    }

    .logo-zone img {
      height: 96px;
      width: auto;
      object-fit: contain;
    }

    /* ── Title ── */
    .title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(180, 210, 240, 0.5);
      text-align: center;
      margin-bottom: 20px;
    }

    /* ── Inline row: input + button ── */
    .row {
      display: flex;
      gap: 8px;
      align-items: stretch;
    }

    .row input[type="email"] {
      flex: 1;
      height: 44px;
      padding: 0 14px;
      border-radius: 11px;
      border: 1px solid #1E3A5F;
      background: #0e1a27;
      color: rgba(210, 235, 255, 0.95);
      font-family: 'Heiti TC', 'STHeiti', monospace;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      min-width: 0;
    }

    .row input[type="email"]:focus {
      border-color: #2d5a8e;
      box-shadow: 0 0 0 3px rgba(30,58,95,0.5);
    }

    .row input[type="email"]::placeholder {
      color: rgba(120, 165, 210, 0.35);
    }

    .row button {
      height: 44px;
      padding: 0 18px;
      white-space: nowrap;
      border-radius: 11px;
      border: 1px solid #1E3A5F;
      background: #1E3A5F;
      color: rgba(210, 235, 255, 0.95);
      font-family: 'Juana', 'Heiti TC', 'STHeiti', serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: background 0.2s, border-color 0.2s;
    }

    .row button::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(180,220,255,0.08), transparent);
      transform: translateX(-100%);
      transition: transform 0.5s;
    }

    .row button:hover { background: #264a78; border-color: #2d5a8e; }
    .row button:hover::before { transform: translateX(100%); }
    .row button:disabled { opacity: 0.5; cursor: default; }

    /* ── Status ── */
    .status {
      margin-top: 12px;
      min-height: 18px;
      text-align: center;
      font-family: 'Heiti TC', 'STHeiti', monospace;
      font-size: 11px;
      letter-spacing: 0.04em;
      color: rgba(150,195,235,0.6);
    }
    .status.success { color: rgba(100,210,160,0.9); }
    .status.error   { color: rgba(255,120,120,0.9); }
  </style>
</head>
<body>

<canvas id="tree"></canvas>
<div class="vignette"></div>

<div class="card">
  <div class="logo-zone">
    <img src="logo.png" alt="Intellectus Agens" />
  </div>

  <div class="title">Intellectus Agens</div>

  <form id="subForm" action="https://formspree.io/f/mzdkozzw" method="POST">
    <div class="row">
      <input type="email" name="email" placeholder="your@email.com" required />
      <button type="submit" id="submitBtn">Notify me</button>
    </div>
  </form>

  <div class="status" id="status"></div>
</div>

<script>
// ── Form ─────────────────────────────────────────────────────────────────────
const form      = document.getElementById('subForm');
const submitBtn = document.getElementById('submitBtn');
const status    = document.getElementById('status');

form.addEventListener('submit', async e => {
  e.preventDefault();
  submitBtn.disabled = true;
  status.className = 'status';
  status.textContent = 'Sending…';
  try {
    const res = await fetch(form.action, {
      method: 'POST', body: new FormData(form),
      headers: { Accept: 'application/json' }
    });
    if (res.ok) {
      status.className = 'status success';
      status.textContent = '✓ You\'re on the list!';
      form.reset();
    } else {
      const j = await res.json().catch(() => ({}));
      throw new Error(j.error || 'Submission failed');
    }
  } catch (err) {
    status.className = 'status error';
    status.textContent = '✗ ' + err.message;
    submitBtn.disabled = false;
  }
});

// ── Network background ────────────────────────────────────────────────────────
(() => {
  const canvas = document.getElementById('tree');
  const ctx    = canvas.getContext('2d');

  const ROOT_POS    = { x: 0.88, y: 0.32 };
  const LEVELS      = 9;
  const ROOT_WEDGES = [
    { center: Math.PI * 2.00, spread: Math.PI * 0.42, count: 5 },
    { center: Math.PI * 1.50, spread: Math.PI * 0.42, count: 5 },
    { center: Math.PI * 1.00, spread: Math.PI * 0.42, count: 4 },
    { center: Math.PI * 0.90, spread: Math.PI * 0.60, count: 5 },
    { center: Math.PI * 0.50, spread: Math.PI * 0.42, count: 4 },
    { center: Math.PI * 0.15, spread: Math.PI * 0.40, count: 5 },
  ];
  const ROOT_CHILDREN = 50;
  const BRANCH_MIN = 0, BRANCH_MAX = 3;
  const ANGLE_JITTER = 0.24, SUBTREE_SWAY = 0.28;
  const NODE_SIZE_ROOT = 1.2, NODE_SIZE = 1.2;
  const EDGE_WIDTH = 0.7;
  const PACKETS = 28, PACKET_SPEED = 0.75;
  const PULSE_HALF = 2.01, PULSE_INTENSITY = 0.4, PULSE_DOT = 1.2;
  // Extra margin so nodes are placed well away from screen edge — they fade out via vignette
  const MARGIN_FRAC = 0.0;

  const clamp = (v, a, b) => Math.min(b, Math.max(a, v));
  const rand  = n => (Math.random() - 0.5) * 2 * n;

  // Build tree
  const nodes = [];
  const edges = [];

  function addNode(parent, depth) {
    const idx = nodes.length;
    nodes.push({ parent, children: [], depth, angle: 0, nx: 0, ny: 0, x: 0, y: 0 });
    if (parent !== -1) nodes[parent].children.push(idx);
    return idx;
  }

  const root = addNode(-1, 0);
  const rootKids = [];

  for (const wedge of ROOT_WEDGES) {
    for (let i = 0; i < wedge.count; i++) {
      const c = addNode(root, 1);
      const u = wedge.count <= 1 ? 0.5 : i / (wedge.count - 1);
      nodes[c].angle = (wedge.center - wedge.spread / 2) + u * wedge.spread + rand(ANGLE_JITTER * 0.6);
      edges.push({ a: root, b: c });
      rootKids.push(c);
    }
  }
  while (rootKids.length < ROOT_CHILDREN) {
    const c = addNode(root, 1);
    nodes[c].angle = Math.PI * 0.90 + rand(0.45);
    edges.push({ a: root, b: c });
    rootKids.push(c);
  }

  let frontier = [...rootKids];
  for (let d = 2; d <= LEVELS; d++) {
    const next = [];
    for (const p of frontier) {
      const k = Math.floor(BRANCH_MIN + Math.random() * (BRANCH_MAX - BRANCH_MIN + 1));
      for (let i = 0; i < k; i++) {
        const c = addNode(p, d);
        edges.push({ a: p, b: c });
        next.push(c);
      }
    }
    frontier = next;
  }

  const stk = [root];
  while (stk.length) {
    const u = stk.pop();
    for (const c of nodes[u].children) {
      if (u !== root) nodes[c].angle = nodes[u].angle + rand(SUBTREE_SWAY) + rand(ANGLE_JITTER);
      stk.push(c);
    }
  }

  // Store normalized offsets so resize just rescales
  const REF_DIAG = Math.hypot(1920, 1080);
  for (let i = 1; i < nodes.length; i++) {
    const nd = nodes[i];
    const r  = 28 + Math.pow(nd.depth, 1.25) * 68 + rand(68);
    nd.nx = (Math.cos(nd.angle) * r + rand(12)) / REF_DIAG;
    nd.ny = (Math.sin(nd.angle) * r + rand(12)) / REF_DIAG;
  }

  let w, h, dpr, diag;
  let keep = [], keptEdges = [], childrenKept = new Map();

  function layout() {
    dpr  = Math.max(1, window.devicePixelRatio || 1);
    w    = window.innerWidth;
    h    = window.innerHeight;
    diag = Math.hypot(w, h);

    canvas.width        = Math.floor(w * dpr);
    canvas.height       = Math.floor(h * dpr);
    canvas.style.width  = w + 'px';
    canvas.style.height = h + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    nodes[root].x = w * ROOT_POS.x;
    nodes[root].y = h * ROOT_POS.y;

    for (let i = 1; i < nodes.length; i++) {
      nodes[i].x = nodes[root].x + nodes[i].nx * diag;
      nodes[i].y = nodes[root].y + nodes[i].ny * diag;
    }

    // No hard culling — let the vignette CSS fade edges naturally.
    // Only cull nodes that are wildly off-screen (> 20% beyond edge).
    keep = new Array(nodes.length).fill(true);
    for (let i = 1; i < nodes.length; i++) {
      const nd = nodes[i];
      if (nd.x < -w * 0.2 || nd.x > w * 1.2 ||
          nd.y < -h * 0.2 || nd.y > h * 1.2) keep[i] = false;
    }
    for (let i = 1; i < nodes.length; i++) {
      if (!keep[i]) {
        const s = [...nodes[i].children];
        while (s.length) { const c = s.pop(); keep[c] = false; s.push(...nodes[c].children); }
      }
    }

    keptEdges    = edges.filter(e => keep[e.a] && keep[e.b]);
    childrenKept = new Map();
    for (let i = 0; i < nodes.length; i++) {
      if (keep[i]) childrenKept.set(i, nodes[i].children.filter(c => keep[c]));
    }
  }

  layout();
  window.addEventListener('resize', layout);

  // Packets
  function edgeIdx(a, b) {
    for (let i = 0; i < keptEdges.length; i++)
      if (keptEdges[i].a === a && keptEdges[i].b === b) return i;
    return -1;
  }

  function rndKid(p) {
    const kids = childrenKept.get(p) || [];
    return kids.length ? kids[Math.floor(Math.random() * kids.length)] : -1;
  }

  function newPacket() {
    const c   = rndKid(root);
    const idx = c === -1 ? 0 : edgeIdx(root, c);
    return { e: idx < 0 ? 0 : idx, t: 0, dir: 1,
             speed: PACKET_SPEED * (0.75 + Math.random() * 0.9),
             path: idx < 0 ? [] : [idx] };
  }

  const packets = Array.from({ length: PACKETS }, newPacket);

  function stepPacket(p) {
    const e = keptEdges[p.e];
    if (!e) { Object.assign(p, newPacket()); return; }
    if (p.dir === 1) {
      const kids = childrenKept.get(e.b) || [];
      if (kids.length) {
        const nc  = kids[Math.floor(Math.random() * kids.length)];
        const idx = edgeIdx(e.b, nc);
        if (idx !== -1) { p.e = idx; p.path.push(idx); p.t = 0; return; }
      }
      p.dir = -1; p.t = 1; return;
    }
    if (p.path.length > 0) p.path.pop();
    if (!p.path.length) { Object.assign(p, newPacket()); return; }
    p.e = p.path[p.path.length - 1]; p.dir = -1; p.t = 1;
  }

  // Draw helpers
  function drawEdge(a, b, alpha) {
    ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
    ctx.lineWidth   = EDGE_WIDTH;
    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
  }

  function drawPulse(a, b, t) {
    t = clamp(t, 0, 1);
    const t0 = Math.max(0, t - PULSE_HALF), t1 = Math.min(1, t + PULSE_HALF);
    const x0 = a.x+(b.x-a.x)*t0, y0 = a.y+(b.y-a.y)*t0;
    const x1 = a.x+(b.x-a.x)*t1, y1 = a.y+(b.y-a.y)*t1;
    const g  = ctx.createLinearGradient(x0, y0, x1, y1);
    g.addColorStop(0,   'rgba(255,255,255,0)');
    g.addColorStop(0.5, `rgba(255,255,255,${0.9 * PULSE_INTENSITY})`);
    g.addColorStop(1,   'rgba(255,255,255,0)');
    ctx.strokeStyle = g;
    ctx.lineWidth   = Math.max(1.4, EDGE_WIDTH + 0.8);
    ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x1, y1); ctx.stroke();
  }

  function drawNode(nd, isRoot) {
    ctx.fillStyle = isRoot ? 'rgba(255,255,255,0.95)' : 'rgba(220,220,220,0.85)';
    ctx.beginPath();
    ctx.arc(nd.x, nd.y, isRoot ? NODE_SIZE_ROOT : NODE_SIZE, 0, Math.PI * 2);
    ctx.fill();
  }

  let last = performance.now();
  function frame(now) {
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    ctx.clearRect(0, 0, w, h);

    for (const e of keptEdges) {
      const depth = nodes[e.b].depth;
      drawEdge(nodes[e.a], nodes[e.b], (0.26 - (depth / (LEVELS+1)) * 0.14) * 0.7);
    }

    for (const p of packets) {
      p.t += p.dir * p.speed * dt;
      if (p.dir ===  1 && p.t >= 1) { p.t = 1; stepPacket(p); }
      if (p.dir === -1 && p.t <= 0) { p.t = 0; stepPacket(p); }
      const e = keptEdges[p.e]; if (!e) continue;
      drawPulse(nodes[e.a], nodes[e.b], p.t);
      ctx.fillStyle = 'rgba(255,255,255,0.95)';
      ctx.beginPath();
      ctx.arc(
        nodes[e.a].x + (nodes[e.b].x - nodes[e.a].x) * p.t,
        nodes[e.a].y + (nodes[e.b].y - nodes[e.a].y) * p.t,
        PULSE_DOT, 0, Math.PI * 2
      );
      ctx.fill();
    }

    for (let i = 0; i < nodes.length; i++) {
      if (i !== root && !keep[i]) continue;
      drawNode(nodes[i], i === root);
    }

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
